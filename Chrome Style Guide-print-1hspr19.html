  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"2cf769cf-f969-4fcd-bb81-f28f5b6009ef\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<style>\n  html,body{margin:0;padding:0;}\n  *{box-sizing:border-box;}\n  body{background:#0a0a0c;}\n  ::selection{background:rgba(138,180,248,.35);}\n  a{color:#8ab4f8;}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"background:#0a0a0c;min-height:100vh;color:#e8eaed;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;padding:56px 32px 100px;\">\n  <div style=\"max-width:1120px;margin:0 auto;\">\n\n    <!-- MASTHEAD -->\n    <div style=\"border-bottom:1px solid #26272b;padding-bottom:32px;margin-bottom:48px;\">\n      <div style=\"display:flex;align-items:center;gap:11px;margin-bottom:20px;\">\n        <div style=\"width:26px;height:26px;border-radius:7px;background:#2f6fd6;display:flex;align-items:center;justify-content:center;\">\n          <div style=\"width:10px;height:10px;background:#fff;border-radius:2.5px;\"><\u002Fdiv>\n        <\u002Fdiv>\n        <span style=\"font-size:14px;color:#9aa0a6;letter-spacing:.3px;\">Chrome Style Guide<\u002Fspan>\n      <\u002Fdiv>\n      <h1 style=\"margin:0 0 14px;font-size:44px;font-weight:600;letter-spacing:-.5px;line-height:1.05;\">Application Chrome Style Guide<\u002Fh1>\n      <p style=\"margin:0 0 24px;max-width:680px;font-size:16px;line-height:1.6;color:#bdc1c6;\">The window shell for the Chrome Style Guide Electron app — title bar, tab strip, toolbar, omnibar and overlays. Every measurement below is production-exact. Original design; browser-derived interaction patterns.<\u002Fp>\n      <div style=\"display:flex;flex-wrap:wrap;gap:10px;\">\n        <span style=\"font-size:12px;padding:6px 12px;border-radius:20px;background:#17181a;border:1px solid #26272b;color:#bdc1c6;\">Windows chrome<\u002Fspan>\n        <span style=\"font-size:12px;padding:6px 12px;border-radius:20px;background:#17181a;border:1px solid #26272b;color:#bdc1c6;\">Dark theme<\u002Fspan>\n        <span style=\"font-size:12px;padding:6px 12px;border-radius:20px;background:#17181a;border:1px solid #26272b;color:#bdc1c6;\">Segoe UI / system-ui<\u002Fspan>\n        <span style=\"font-size:12px;padding:6px 12px;border-radius:20px;background:#17181a;border:1px solid #26272b;color:#bdc1c6;\">Accent #2f6fd6<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 01 LIVE REFERENCE -->\n    <div style=\"margin-bottom:64px;\">\n      <div style=\"display:flex;align-items:baseline;gap:14px;margin-bottom:8px;\">\n        <span style=\"font-size:13px;font-weight:700;color:#2f6fd6;font-family:ui-monospace,monospace;\">01<\u002Fspan>\n        <h2 style=\"margin:0;font-size:24px;font-weight:600;\">Live reference window<\u002Fh2>\n      <\u002Fdiv>\n      <p style=\"margin:0 0 24px;font-size:14px;color:#9aa0a6;max-width:640px;\">The full assembled shell. Interactive: open the tab-search dropdown (chevron, top-left), add tabs with <b style=\"color:#bdc1c6;\">+<\u002Fb> to watch them shrink then the strip scroll, close tabs, and try the Tweaks panel to change accent, app name and minimum tab width.<\u002Fp>\n      <div style=\"border-radius:14px;overflow:hidden;border:1px solid #26272b;\">\n        <dc-import name=\"Chrome Style Guide Window\" hint-size=\"1200px,750px\"><\u002Fdc-import>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 02 COLOR -->\n    <div style=\"margin-bottom:64px;\">\n      <div style=\"display:flex;align-items:baseline;gap:14px;margin-bottom:20px;\">\n        <span style=\"font-size:13px;font-weight:700;color:#2f6fd6;font-family:ui-monospace,monospace;\">02<\u002Fspan>\n        <h2 style=\"margin:0;font-size:24px;font-weight:600;\">Color tokens<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:14px;\">\n        <sc-for list=\"{{ colors }}\" as=\"c\" hint-placeholder-count=\"8\">\n          <div style=\"display:flex;align-items:center;gap:16px;background:#17181a;border:1px solid #26272b;border-radius:12px;padding:14px 16px;\">\n            <div style=\"width:44px;height:44px;flex:0 0 44px;border-radius:9px;background:{{ c.hex }};border:1px solid rgba(255,255,255,.08);\"><\u002Fdiv>\n            <div style=\"flex:1 1 auto;min-width:0;\">\n              <div style=\"font-size:14px;font-weight:600;color:#e8eaed;\">{{ c.name }}<\u002Fdiv>\n              <div style=\"font-size:12px;color:#9aa0a6;\">{{ c.role }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font-size:12px;font-family:ui-monospace,monospace;color:#bdc1c6;\">{{ c.hex }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 03 TYPE -->\n    <div style=\"margin-bottom:64px;\">\n      <div style=\"display:flex;align-items:baseline;gap:14px;margin-bottom:20px;\">\n        <span style=\"font-size:13px;font-weight:700;color:#2f6fd6;font-family:ui-monospace,monospace;\">03<\u002Fspan>\n        <h2 style=\"margin:0;font-size:24px;font-weight:600;\">Typography<\u002Fh2>\n      <\u002Fdiv>\n      <p style=\"margin:0 0 20px;font-size:14px;color:#9aa0a6;\">Single family: <b style=\"color:#bdc1c6;\">Segoe UI<\u002Fb>, falling back to the platform <span style=\"font-family:ui-monospace,monospace;\">system-ui<\u002Fspan> stack. No custom webfont — matches native window rendering.<\u002Fp>\n      <div style=\"background:#17181a;border:1px solid #26272b;border-radius:12px;overflow:hidden;\">\n        <sc-for list=\"{{ type }}\" as=\"t\" hint-placeholder-count=\"6\">\n          <div style=\"display:flex;align-items:center;gap:20px;padding:16px 20px;border-top:1px solid #202125;\">\n            <div style=\"flex:0 0 320px;{{ t.style }}\">{{ t.sample }}<\u002Fdiv>\n            <div style=\"flex:1 1 auto;font-size:13px;color:#9aa0a6;\">{{ t.role }}<\u002Fdiv>\n            <div style=\"flex:0 0 auto;font-size:12px;font-family:ui-monospace,monospace;color:#bdc1c6;text-align:right;\">{{ t.spec }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 04 TITLE BAR -->\n    <div style=\"margin-bottom:64px;\">\n      <div style=\"display:flex;align-items:baseline;gap:14px;margin-bottom:8px;\">\n        <span style=\"font-size:13px;font-weight:700;color:#2f6fd6;font-family:ui-monospace,monospace;\">04<\u002Fspan>\n        <h2 style=\"margin:0;font-size:24px;font-weight:600;\">Title bar<\u002Fh2>\n      <\u002Fdiv>\n      <p style=\"margin:0 0 20px;font-size:14px;color:#9aa0a6;max-width:680px;\">The Electron-specific row that a browser lacks. It carries the app identity and the OS window controls, so the tab strip below stays dedicated to tabs. Draggable region (<span style=\"font-family:ui-monospace,monospace;\">-webkit-app-region: drag<\u002Fspan>) everywhere except the controls.<\u002Fp>\n      <div style=\"border:1px solid #26272b;border-radius:12px;overflow:hidden;margin-bottom:18px;\">\n        <div style=\"height:44px;background:#171717;display:flex;align-items:center;justify-content:space-between;padding-left:16px;\">\n          <div style=\"display:flex;align-items:center;gap:11px;\">\n            <div style=\"width:17px;height:17px;border-radius:5px;background:#2f6fd6;display:flex;align-items:center;justify-content:center;\"><div style=\"width:7px;height:7px;background:#fff;border-radius:2px;\"><\u002Fdiv><\u002Fdiv>\n            <span style=\"font-size:12px;color:#c8ccd0;\">Chrome Style Guide<\u002Fspan>\n            <span style=\"font-size:12px;color:#6b7075;\">— Private session<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;height:44px;\">\n            <div style=\"width:46px;display:flex;align-items:center;justify-content:center;color:#c8ccd0;\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\"><line x1=\"2\" y1=\"6\" x2=\"10\" y2=\"6\" stroke=\"currentColor\" stroke-width=\"1\"><\u002Fline><\u002Fsvg><\u002Fdiv>\n            <div style=\"width:46px;display:flex;align-items:center;justify-content:center;color:#c8ccd0;\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\"><rect x=\"2.5\" y=\"2.5\" width=\"7\" height=\"7\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1\"><\u002Frect><\u002Fsvg><\u002Fdiv>\n            <div style=\"width:46px;display:flex;align-items:center;justify-content:center;background:#e81123;color:#fff;\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\"><line x1=\"2.5\" y1=\"2.5\" x2=\"9.5\" y2=\"9.5\" stroke=\"currentColor\" stroke-width=\"1\"><\u002Fline><line x1=\"9.5\" y1=\"2.5\" x2=\"2.5\" y2=\"9.5\" stroke=\"currentColor\" stroke-width=\"1\"><\u002Fline><\u002Fsvg><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:14px;\">\n        <sc-for list=\"{{ titleSpecs }}\" as=\"s\" hint-placeholder-count=\"4\">\n          <div style=\"display:flex;justify-content:space-between;gap:12px;background:#17181a;border:1px solid #26272b;border-radius:10px;padding:12px 16px;\">\n            <span style=\"font-size:13px;color:#bdc1c6;\">{{ s.k }}<\u002Fspan>\n            <span style=\"font-size:12px;font-family:ui-monospace,monospace;color:#e8eaed;text-align:right;\">{{ s.v }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 05 TAB STRIP -->\n    <div style=\"margin-bottom:64px;\">\n      <div style=\"display:flex;align-items:baseline;gap:14px;margin-bottom:8px;\">\n        <span style=\"font-size:13px;font-weight:700;color:#2f6fd6;font-family:ui-monospace,monospace;\">05<\u002Fspan>\n        <h2 style=\"margin:0;font-size:24px;font-weight:600;\">Tab strip<\u002Fh2>\n      <\u002Fdiv>\n      <p style=\"margin:0 0 20px;font-size:14px;color:#9aa0a6;max-width:680px;\">Left-to-right: tab-search chevron, the scrollable tab track, then the new-tab button. Active tab is a filled, top-rounded panel matching the toolbar surface below it, so it reads as physically connected to the content.<\u002Fp>\n\n      <!-- states demo -->\n      <div style=\"background:#292a2d;border:1px solid #26272b;border-radius:12px 12px 0 0;padding:0 6px;height:40px;display:flex;align-items:flex-end;margin-bottom:0;\">\n        <div style=\"width:32px;height:30px;margin:0 6px 5px 2px;border-radius:8px;background:#3c4043;color:#e8eaed;display:flex;align-items:center;justify-content:center;\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\"><path d=\"M6 9l6 6 6-6\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <!-- active -->\n        <div style=\"width:220px;height:34px;margin:0 1px;padding:0 10px;border-radius:10px 10px 0 0;background:#35363a;display:flex;align-items:center;gap:8px;\">\n          <div style=\"width:16px;height:16px;border-radius:4px;background:#5f6368;flex:0 0 16px;\"><\u002Fdiv>\n          <span style=\"flex:1;font-size:12px;color:#e8eaed;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">Active tab<\u002Fspan>\n          <div style=\"width:24px;height:24px;border-radius:6px;color:#bdc1c6;display:flex;align-items:center;justify-content:center;\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 12 12\"><line x1=\"2.5\" y1=\"2.5\" x2=\"9.5\" y2=\"9.5\" stroke=\"currentColor\" stroke-width=\"1.3\"><\u002Fline><line x1=\"9.5\" y1=\"2.5\" x2=\"2.5\" y2=\"9.5\" stroke=\"currentColor\" stroke-width=\"1.3\"><\u002Fline><\u002Fsvg><\u002Fdiv>\n        <\u002Fdiv>\n        <!-- hover -->\n        <div style=\"width:220px;height:34px;margin:0 1px;padding:0 10px;border-radius:10px 10px 0 0;background:#33343799;display:flex;align-items:center;gap:8px;\">\n          <div style=\"width:16px;height:16px;border-radius:4px;background:#5f6368;flex:0 0 16px;\"><\u002Fdiv>\n          <span style=\"flex:1;font-size:12px;color:#e8eaed;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">Hovered tab<\u002Fspan>\n          <div style=\"width:24px;height:24px;border-radius:6px;background:#5f6368;color:#fff;display:flex;align-items:center;justify-content:center;\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 12 12\"><line x1=\"2.5\" y1=\"2.5\" x2=\"9.5\" y2=\"9.5\" stroke=\"currentColor\" stroke-width=\"1.3\"><\u002Fline><line x1=\"9.5\" y1=\"2.5\" x2=\"2.5\" y2=\"9.5\" stroke=\"currentColor\" stroke-width=\"1.3\"><\u002Fline><\u002Fsvg><\u002Fdiv>\n        <\u002Fdiv>\n        <!-- inactive -->\n        <div style=\"width:220px;height:34px;margin:0 1px;padding:0 10px;border-radius:10px 10px 0 0;display:flex;align-items:center;gap:8px;\">\n          <div style=\"width:16px;height:16px;border-radius:4px;background:#5f6368;flex:0 0 16px;\"><\u002Fdiv>\n          <span style=\"flex:1;font-size:12px;color:#bdc1c6;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">Inactive tab<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"width:30px;height:30px;margin:0 2px 5px 4px;border-radius:8px;background:#3c4043;color:#c8ccd0;display:flex;align-items:center;justify-content:center;\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\"><line x1=\"12\" y1=\"5\" x2=\"12\" y2=\"19\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fline><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fline><\u002Fsvg><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"height:6px;background:#35363a;border-left:1px solid #26272b;border-right:1px solid #26272b;\"><\u002Fdiv>\n      <div style=\"display:flex;gap:24px;font-size:12px;color:#80868b;padding:10px 4px 24px;\">\n        <span>◂ Search chevron 32×30<\u002Fspan>\n        <span>Active #35363a<\u002Fspan>\n        <span>Hover +6% white<\u002Fspan>\n        <span>Inactive transparent<\u002Fspan>\n        <span>New-tab 30×30 ▸<\u002Fspan>\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:20px;\">\n        <sc-for list=\"{{ tabSpecs }}\" as=\"s\" hint-placeholder-count=\"6\">\n          <div style=\"display:flex;justify-content:space-between;gap:12px;background:#17181a;border:1px solid #26272b;border-radius:10px;padding:12px 16px;\">\n            <span style=\"font-size:13px;color:#bdc1c6;\">{{ s.k }}<\u002Fspan>\n            <span style=\"font-size:12px;font-family:ui-monospace,monospace;color:#e8eaed;text-align:right;\">{{ s.v }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"background:#12130f00;border:1px solid #2f6fd633;background:#141821;border-radius:12px;padding:18px 20px;\">\n        <div style=\"font-size:14px;font-weight:600;color:#e8eaed;margin-bottom:8px;\">Shrink &amp; scroll behavior<\u002Fdiv>\n        <p style=\"margin:0;font-size:13px;line-height:1.7;color:#bdc1c6;\">Tab width = <span style=\"font-family:ui-monospace,monospace;color:#8ab4f8;\">min(240, trackWidth / tabCount)<\u002Fspan>. As tabs are added each shrinks evenly from the <b>240px<\u002Fb> max. At the <b>52px<\u002Fb> minimum the label and close button drop out, leaving only the favicon. Below that the strip stops shrinking and becomes horizontally scrollable — the mouse wheel scrolls it left/right. The active tab always keeps its label and close button.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 06 TOOLBAR -->\n    <div style=\"margin-bottom:64px;\">\n      <div style=\"display:flex;align-items:baseline;gap:14px;margin-bottom:8px;\">\n        <span style=\"font-size:13px;font-weight:700;color:#2f6fd6;font-family:ui-monospace,monospace;\">06<\u002Fspan>\n        <h2 style=\"margin:0;font-size:24px;font-weight:600;\">Toolbar &amp; omnibar<\u002Fh2>\n      <\u002Fdiv>\n      <p style=\"margin:0 0 20px;font-size:14px;color:#9aa0a6;max-width:680px;\">Nav cluster (back / forward / reload) — often suppressed in app mode — then the omnibar fills the track, then the optional right cluster. Forward is shown disabled (#75797e) when there is no forward history.<\u002Fp>\n      <div style=\"border:1px solid #26272b;border-radius:12px;overflow:hidden;margin-bottom:20px;\">\n        <div style=\"height:48px;background:#35363a;display:flex;align-items:center;gap:2px;padding:0 8px;\">\n          <div style=\"width:32px;height:32px;border-radius:50%;color:#c8ccd0;display:flex;align-items:center;justify-content:center;\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\"><path d=\"M15 5l-7 7 7 7\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <div style=\"width:32px;height:32px;border-radius:50%;color:#75797e;display:flex;align-items:center;justify-content:center;\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\"><path d=\"M9 5l7 7-7 7\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <div style=\"width:32px;height:32px;margin-right:6px;border-radius:50%;color:#c8ccd0;display:flex;align-items:center;justify-content:center;\"><svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\"><path d=\"M20 11a8 8 0 10-.6 4\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M20 4v5h-5\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <div style=\"flex:1;height:34px;background:#202124;border-radius:18px;display:flex;align-items:center;gap:12px;padding:0 16px;\">\n            <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" style=\"color:#9aa0a6;flex:0 0 16px;\"><circle cx=\"10.5\" cy=\"10.5\" r=\"6.5\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><\u002Fcircle><line x1=\"15.5\" y1=\"15.5\" x2=\"20\" y2=\"20\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fline><\u002Fsvg>\n            <span style=\"flex:1;font-size:14px;color:#80868b;\">Search Chrome Style Guide or type a URL<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:8px;margin-left:8px;\">\n            <div style=\"height:34px;padding:0 14px 0 12px;border-radius:17px;background:#3c4043;color:#e8eaed;display:flex;align-items:center;gap:8px;font-size:13px;\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\"><path d=\"M12 3l7 3v5c0 4.2-3 7.4-7 8.5C8 18.4 5 15.2 5 11V6z\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>Private<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;height:34px;background:#2f6fd6;border-radius:17px;\"><span style=\"padding:0 6px 0 16px;color:#fff;font-size:13px;font-weight:600;\">Finish setup<\u002Fspan><div style=\"width:34px;height:34px;display:flex;align-items:center;justify-content:center;color:#fff;\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\"><circle cx=\"12\" cy=\"5\" r=\"1.6\" fill=\"currentColor\"><\u002Fcircle><circle cx=\"12\" cy=\"12\" r=\"1.6\" fill=\"currentColor\"><\u002Fcircle><circle cx=\"12\" cy=\"19\" r=\"1.6\" fill=\"currentColor\"><\u002Fcircle><\u002Fsvg><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:14px;\">\n        <sc-for list=\"{{ toolbarSpecs }}\" as=\"s\" hint-placeholder-count=\"6\">\n          <div style=\"display:flex;justify-content:space-between;gap:12px;background:#17181a;border:1px solid #26272b;border-radius:10px;padding:12px 16px;\">\n            <span style=\"font-size:13px;color:#bdc1c6;\">{{ s.k }}<\u002Fspan>\n            <span style=\"font-size:12px;font-family:ui-monospace,monospace;color:#e8eaed;text-align:right;\">{{ s.v }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 07 TAB SEARCH POPUP -->\n    <div style=\"margin-bottom:64px;\">\n      <div style=\"display:flex;align-items:baseline;gap:14px;margin-bottom:8px;\">\n        <span style=\"font-size:13px;font-weight:700;color:#2f6fd6;font-family:ui-monospace,monospace;\">07<\u002Fspan>\n        <h2 style=\"margin:0;font-size:24px;font-weight:600;\">Tab-search popup<\u002Fh2>\n      <\u002Fdiv>\n      <p style=\"margin:0 0 20px;font-size:14px;color:#9aa0a6;max-width:680px;\">Opened by the chevron or <span style=\"font-family:ui-monospace,monospace;\">Ctrl+Shift+A<\u002Fspan>. Anchored to the top-left under the chevron. Filter field on top, then grouped sections (Open Tabs, then Recently Closed). Each row shows a 36px favicon tile, title, and <span style=\"font-family:ui-monospace,monospace;\">url • time<\u002Fspan> meta; the close button appears on row hover.<\u002Fp>\n      <div style=\"display:flex;gap:32px;flex-wrap:wrap;align-items:flex-start;\">\n        <div style=\"width:480px;background:#292a2d;border-radius:12px;box-shadow:0 16px 44px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.05);overflow:hidden;\">\n          <div style=\"display:flex;align-items:center;gap:14px;padding:14px 18px;\">\n            <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" style=\"color:#9aa0a6;flex:0 0 18px;\"><circle cx=\"10.5\" cy=\"10.5\" r=\"6.5\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><\u002Fcircle><line x1=\"15.5\" y1=\"15.5\" x2=\"20\" y2=\"20\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fline><\u002Fsvg>\n            <span style=\"flex:1;font-size:15px;color:#80868b;\">Search tabs<\u002Fspan>\n            <span style=\"font-size:12px;color:#80868b;\">Ctrl+Shift+A<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"height:1px;background:#3c4043;\"><\u002Fdiv>\n          <div style=\"padding:12px 18px 6px;font-size:12px;font-weight:600;color:#9aa0a6;letter-spacing:.4px;\">Open Tabs<\u002Fdiv>\n          <div style=\"padding:0 8px 10px;\">\n            <div style=\"d  services you use. Downloads and saved files are kept. <a href=\\\"#\\\" style=\\\"color:#8ab4f8;text-decoration:none;\\\">Learn more<\\/a><\\/p>\\n        <div style=\\\"display:flex;gap:70px;width:100%;max-width:640px;justify-content:center;margin-bottom:36px;\\\">\\n          <div>\\n            <div style=\\\"font-size:15px;font-weight:600;color:#e8eaed;margin-bottom:12px;\\\">{{ appName }} won't save<\\/div>\\n            <ul style=\\\"margin:0;padding-left:20px;color:#bdc1c6;font-size:14px;line-height:2;\\\">\\n              <li>Your session history<\\/li>\\n              <li>Cookies and site data<\\/li>\\n              <li>Information entered in forms<\\/li>\\n            <\\/ul>\\n          <\\/div>\\n          <div>\\n            <div style=\\\"font-size:15px;font-weight:600;color:#e8eaed;margin-bottom:12px;\\\">Your activity may still be visible to<\\/div>\\n            <ul style=\\\"margin:0;padding-left:20px;color:#bdc1c6;font-size:14px;line-height:2;\\\">\\n              <li>The sites you visit<\\/li>\\n              <li>Your organization<\\/li>\\n              <li>Your network provider<\\/li>\\n            <\\/ul>\\n          <\\/div>\\n        <\\/div>\\n        <!-- CALLOUT -->\\n        <div style=\\\"width:100%;max-width:640px;background:#2a2b2e;border-radius:12px;padding:20px 22px;\\\">\\n          <div style=\\\"display:flex;align-items:center;gap:12px;margin-bottom:10px;\\\">\\n            <svg width=\\\"20\\\" height=\\\"20\\\" viewBox=\\\"0 0 24 24\\\" style=\\\"color:#e8eaed;\\\"><path d=\\\"M3 3l18 18\\\" stroke=\\\"currentColor\\\" stroke-width=\\\"1.8\\\" stroke-linecap=\\\"round\\\"/><path d=\\\"M10.6 5.1A9.8 9.8 0 0112 5c5 0 9 4.5 10 7-.5 1.3-1.6 2.9-3.2 4.2M6.5 6.6C4.2 8 2.7 10 2 12c1 2.5 5 7 10 7 1.4 0 2.7-.3 3.9-.9\\\" fill=\\\"none\\\" stroke=\\\"currentColor\\\" stroke-width=\\\"1.6\\\"/><\\/svg>\\n            <span style=\\\"font-size:15px;font-weight:600;color:#e8eaed;\\\">Third-party cookies are blocked<\\/span>\\n          <\\/div>\\n          <p style=\\\"margin:0;font-size:14px;line-height:1.6;color:#bdc1c6;\\\">When you're in a private session, sites can't use third-party cookies. If a site that relies on these cookies isn't working, you can <a href=\\\"#\\\" style=\\\"color:#8ab4f8;text-decoration:none;\\\">give it temporary access to third-party cookies<\\/a>.<\\/p>\\n        <\\/div>\\n      <\\/div>\\n    <\\/div>\\n\\n    <!-- TAB SEARCH POPUP -->\\n    <sc-if value=\\\"{{ searchOpen }}\\\" hint-placeholder-val=\\\"{{ false }}\\\">\\n      <div onClick=\\\"{{ closeSearch }}\\\" style=\\\"position:absolute;inset:0;z-index:20;\\\"><\\/div>\\n      <div style=\\\"position:absolute;top:42px;left:6px;z-index:21;width:480px;background:#292a2d;border-radius:12px;box-shadow:0 16px 44px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.05);overflow:hidden;\\\">\\n        <div style=\\\"display:flex;align-items:center;gap:14px;padding:14px 18px;\\\">\\n          <svg width=\\\"18\\\" height=\\\"18\\\" viewBox=\\\"0 0 24 24\\\" style=\\\"color:#9aa0a6;flex:0 0 18px;\\\"><circle cx=\\\"10.5\\\" cy=\\\"10.5\\\" r=\\\"6.5\\\" fill=\\\"none\\\" stroke=\\\"currentColor\\\" stroke-width=\\\"2\\\"/><line x1=\\\"15.5\\\" y1=\\\"15.5\\\" x2=\\\"20\\\" y2=\\\"20\\\" stroke=\\\"currentColor\\\" stroke-width=\\\"2\\\" stroke-linecap=\\\"round\\\"/><\\/svg>\\n          <input value=\\\"{{ query }}\\\" onInput=\\\"{{ setQuery }}\\\" placeholder=\\\"Search tabs\\\" style=\\\"flex:1 1 auto;background:transparent;border:none;outline:none;font-size:15px;color:#e8eaed;font-family:inherit;\\\"/>\\n          <span style=\\\"font-size:12px;color:#80868b;flex:0 0 auto;\\\">Ctrl+Shift+A<\\/span>\\n        <\\/div>\\n        <div style=\\\"height:1px;background:#3c4043;\\\"><\\/div>\\n        <div style=\\\"padding:12px 18px 6px;font-size:12px;font-weight:600;color:#9aa0a6;letter-spacing:.4px;\\\">Open Tabs<\\/div>\\n        <div style=\\\"padding:0 8px 10px;max-height:280px;overflow-y:auto;\\\">\\n          <sc-for list=\\\"{{ filteredTabs }}\\\" as=\\\"row\\\" hint-placeholder-count=\\\"2\\\">\\n            <div onClick=\\\"{{ row.onSelect }}\\\" style=\\\"display:flex;align-items:center;gap:14px;padding:9px 10px;border-radius:8px;cursor:pointer;\\\" style-hover=\\\"background:#3c4043;\\\">\\n              <div style=\\\"width:36px;height:36px;flex:0 0 36px;border-radius:8px;background:#3c4043;display:flex;align-items:center;justify-content:center;\\\">\\n                <svg width=\\\"18\\\" height=\\\"18\\\" viewBox=\\\"0 0 24 24\\\"><circle cx=\\\"12\\\" cy=\\\"12\\\" r=\\\"9\\\" fill=\\\"none\\\" stroke=\\\"#c8ccd0\\\" stroke-width=\\\"2\\\"/><path d=\\\"M3 12h18M12 3c3 3 3 15 0 18M12 3c-3 3-3 15 0 18\\\" fill=\\\"none\\\" stroke=\\\"#c8ccd0\\\" stroke-width=\\\"1.2\\\"/><\\/svg>\\n              <\\/div>\\n              <div style=\\\"flex:1 1 auto;min-width:0;\\\">\\n                <div style=\\\"font-size:14px;font-weight:600;color:#e8eaed;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\\\">{{ row.title }}<\\/div>\\n                <div style=\\\"font-size:12px;color:#9aa0a6;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\\\">{{ row.meta }}<\\/div>\\n              <\\/div>\\n              <button onClick=\\\"{{ row.onClose }}\\\" title=\\\"Close tab\\\" style=\\\"flex:0 0 auto;width:26px;height:26px;border:none;border-radius:50%;background:transparent;color:#bdc1c6;display:flex;align-items:center;justify-content:center;cursor:pointer;\\\" style-hover=\\\"background:#5f6368;color:#fff;\\\">\\n                <svg width=\\\"13\\\" height=\\\"13\\\" viewBox=\\\"0 0 12 12\\\"><line x1=\\\"2.5\\\" y1=\\\"2.5\\\" x2=\\\"9.5\\\" y2=\\\"9.5\\\" stroke=\\\"currentColor\\\" stroke-width=\\\"1.4\\\"/><line x1=\\\"9.5\\\" y1=\\\"2.5\\\" x2=\\\"2.5\\\" y2=\\\"9.5\\\" stroke=\\\"currentColor\\\" stroke-width=\\\"1.4\\\"/><\\/svg>\\n              <\\/button>\\n            <\\/div>\\n          <\\/sc-for>\\n          <sc-if value=\\\"{{ noResults }}\\\" hint-placeholder-val=\\\"{{ false }}\\\">\\n            <div style=\\\"padding:18px 12px;font-size:13px;color:#80868b;text-align:center;\\\">No matching tabs<\\/div>\\n          <\\/sc-if>\\n        <\\/div>\\n      <\\/div>\\n    <\\/sc-if>\\n\\n    <!-- APP MENU (kebab) -->\\n    <sc-if value=\\\"{{ menuOpen }}\\\" hint-placeholder-val=\\\"{{ false }}\\\">\\n      <div onClick=\\\"{{ closeMenu }}\\\" style=\\\"position:absolute;inset:0;z-index:30;\\\"><\\/div>\\n      <div style=\\\"position:absolute;z-index:31;top:88px;right:10px;max-height:640px;overflow-y:auto;border-radius:12px;box-shadow:0 18px 50px rgba(0,0,0,.6);\\\">\\n        <dc-import name=\\\"Chrome Style Guide Menu\\\" accent=\\\"{{ accent }}\\\" hint-size=\\\"340px,860px\\\"><\\/dc-import>\\n      <\\/div>\\n    <\\/sc-if>\\n\\n    <!-- CONTEXT MENU (right-click) -->\\n    <sc-if value=\\\"{{ ctxOpen }}\\\" hint-placeholder-val=\\\"{{ false }}\\\">\\n      <div onClick=\\\"{{ closeCtx }}\\\" onContextMenu=\\\"{{ closeCtx }}\\\" style=\\\"position:absolute;inset:0;z-index:30;\\\"><\\/div>\\n      <div style=\\\"{{ ctxStyle }}width:224px;background:#232427;border-radius:10px;box-shadow:0 16px 44px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.05);overflow:hidden;padding:6px 0;\\\">\\n        <div style=\\\"height:34px;display:flex;align-items:center;gap:14px;padding:0 12px;cursor:default;color:#75797e;\\\">\\n          <svg width=\\\"16\\\" height=\\\"16\\\" viewBox=\\\"0 0 24 24\\\"><path d=\\\"M15 5l-7 7 7 7\\\" fill=\\\"none\\\" stroke=\\\"currentColor\\\" stroke-width=\\\"2\\\" stroke-linecap=\\\"round\\\" stroke-linejoin=\\\"round\\\"/><\\/svg>\\n          <span style=\\\"flex:1;font-size:13px;\\\">Back<\\/span>\\n        <\\/div>\\n        <div style=\\\"height:34px;display:flex;align-items:center;gap:14px;padding:0 12px;cursor:default;color:#e8eaed;\\\" style-hover=\\\"background:rgba(255,255,255,.06);\\\">\\n          <svg width=\\\"16\\\" height=\\\"16\\\" viewBox=\\\"0 0 24 24\\\"><path d=\\\"M9 5l7 7-7 7\\\" fill=\\\"none\\\" stroke=\\\"currentColor\\\" stroke-width=\\\"2\\\" stroke-linecap=\\\"round\\\" stroke-linejoin=\\\"round\\\"/><\\/svg>\\n          <span style=\\\"flex:1;font-size:13px;\\\">Forward<\\/span>\\n        <\\/div>\\n        <div style=\\\"height:34px;display:flex;align-items:center;gap:14px;padding:0 12px;cursor:default;color:#e8eaed;\\\" style-hover=\\\"background:rgba(255,255,255,.06);\\\">\\n          <svg width=\\\"16\\\" height=\\\"16\\\" viewBox=\\\"0 0 24 24\\\"><path d=\\\"M20 11a8 8 0 10-.6 4\\\" fill=\\\"none\\\" stroke=\\\"currentColor\\\" stroke-width=\\\"2\\\" stroke-linecap=\\\"round\\\"/><path d=\\\"M20 4v5h-5\\\" fill=\\\"none\\\" stroke=\\\"currentColor\\\" stroke-width=\\\"2\\\" stroke-linecap=\\\"round\\\" stroke-linejoin=\\\"round\\\"/><\\/svg>\\n          <span style=\\\"flex:1;font-size:13px;\\\">Reload<\\/span>\\n          <span style=\\\"font-size:12px;color:#9aa0a6;\\\">Ctrl+R<\\/span>\\n        <\\/div>\\n        <div style=\\\"height:1px;background:#3c4043;margin:6px 8px;\\\"><\\/div>\\n        <div style=\\\"height:34px;display:flex;align-items:center;gap:14px;padding:0 12px;cursor:default;color:#e8eaed;\\\" style-hover=\\\"background:rgba(255,255,255,.06);\\\">\\n          <span style=\\\"width:16px;flex:0 0 16px;\\\"><\\/span>\\n          <span style=\\\"flex:1;font-size:13px;\\\">Save as…<\\/span>\\n          <span style=\\\"font-size:12px;color:#9aa0a6;\\\">Ctrl+S<\\/span>\\n        <\\/div>\\n        <div style=\\\"height:34px;display:flex;align-items:center;gap:14px;padding:0 12px;cursor:default;color:#e8eaed;\\\" style-hover=\\\"background:rgba(255,255,255,.06);\\\">\\n          <span style=\\\"width:16px;flex:0 0 16px;\\\"><\\/span>\\n          <span style=\\\"flex:1;font-size:13px;\\\">Print…<\\/span>\\n          <span style=\\\"font-size:12px;color:#9aa0a6;\\\">Ctrl+P<\\/span>\\n        <\\/div>\\n        <div style=\\\"height:1px;background:#3c4043;margin:6px 8px;\\\"><\\/div>\\n        <div style=\\\"height:34px;display:flex;align-items:center;gap:14px;padding:0 12px;cursor:default;color:#e8eaed;\\\" style-hover=\\\"background:rgba(255,255,255,.06);\\\">\\n          <span style=\\\"width:16px;flex:0 0 16px;\\\"><\\/span>\\n          <span style=\\\"flex:1;font-size:13px;\\\">View page source<\\/span>\\n          <span style=\\\"font-size:12px;color:#9aa0a6;\\\">Ctrl+U<\\/span>\\n        <\\/div>\\n        <div style=\\\"height:34px;display:flex;align-items:center;gap:14px;padding:0 12px;cursor:default;color:#e8eaed;\\\" style-hover=\\\"background:rgba(255,255,255,.06);\\\">\\n          <span style=\\\"width:16px;flex:0 0 16px;\\\"><\\/span>\\n          <span style=\\\"flex:1;font-size:13px;\\\">Inspect<\\/span>\\n        <\\/div>\\n      <\\/div>\\n    <\\/sc-if>\\n\\n  <\\/div>\\n<\\/div>\",\"js\":\"class Component extends DCLogic {\\n  constructor(props){\\n    super(props);\\n    this.state = {\\n      tabs: [\\n        { id: 1, title: 'New Session', url: 'app://newtab', ago: '9 mins ago' },\\n        { id: 2, title: 'New Session', url: 'app://newtab', ago: '5 mins ago' }\\n      ],\\n      activeId: 2,\\n      searchOpen: false,\\n      query: '',\\n      nextId: 3,\\n      menuOpen: false,\\n      ctx: { open: false, x: 0, y: 0 }\\n    };\\n    this.frameRef = React.createRef();\\n    this.area = 1076;\\n    this.maxTab = 240;\\n  }\\n  selectTab(id){ this.setState({ activeId: id, searchOpen: false }); }\\n  closeTab(id, e){\\n    if(e) e.stopPropagation();\\n    this.setState(s => {\\n      const idx = s.tabs.findIndex(t => t.id === id);\\n      const tabs = s.tabs.filter(t => t.id !== id);\\n      let activeId = s.activeId;\\n      if(activeId === id) activeId = tabs.length ? tabs[Math.min(idx, tabs.length - 1)].id : null;\\n      return { tabs, activeId };\\n    });\\n  }\\n  addTab(){\\n    this.setState(s => {\\n      const id = s.nextId;\\n      return { tabs: [...s.tabs, { id, title: 'New Session', url: 'app://newtab', ago: 'just now' }], activeId: id, nextId: id + 1 };\\n    });\\n  }\\n  toggleSearch(){ this.setState(s => ({ searchOpen: !s.searchOpen, query: '', menuOpen: false, ctx: { open: false, x: 0, y: 0 } })); }\\n  closeSearch(){ this.setState({ searchOpen: false }); }\\n  setQuery(e){ this.setState({ query: e.target.value }); }\\n  toggleMenu(){ this.setState(s => ({ menuOpen: !s.menuOpen, searchOpen: false, ctx: { open: false, x: 0, y: 0 } })); }\\n  closeMenu(){ this.setState({ menuOpen: false }); }\\n  openCtx(e){\\n    e.preventDefault();\\n    const r = this.frameRef.current ? this.frameRef.current.getBoundingClientRect() : { left: 0, top: 0, width: 1200, height: 750 };\\n    let x = e.clientX - r.left, y = e.clientY - r.top;\\n    x = Math.min(x, r.width - 236);\\n    y = Math.min(y, r.height - 300);\\n    this.setState({ ctx: { open: true, x, y }, menuOpen: false, searchOpen: false });\\n  }\\n  closeCtx(){ this.setState({ ctx: { open: false, x: 0, y: 0 } }); }\\n\\n  renderVals(){\\n    const accent = this.props.accent ?? '#2f6fd6';\\n    const appName = this.props.appName ?? 'Chrome Style Guide';\\n    const showOptionalActions = this.props.showOptionalActions ?? true;\\n    const minTab = this.props.minTabWidth ?? 52;\\n    const count = this.state.tabs.length || 1;\\n\\n    let tabWidth = Math.min(this.maxTab, Math.floor(this.area / count));\\n    let scroll = false;\\n    if(tabWidth < minTab){ tabWidth = minTab; scroll = true; }\\n\\n    const baseTab = 'flex:0 0 auto;display:flex;align-items:center;gap:8px;height:34px;margin:0 1px;padding:0 10px;border-radius:10px 10px 0 0;cursor:default;position:relative;overflow:hidden;';\\n\\n    const tabs = this.state.tabs.map(t => {\\n      const active = t.id === this.state.activeId;\\n      const showText = tabWidth >= 90 || active;\\n      const bg = active\\n        ? 'background:#35363a;'\\n        : 'background:transparent;';\\n      const style = baseTab + `width:${tabWidth}px;` + bg + (showText ? '' : 'justify-content:center;padding:0;');\\n      ret       const defaults = document.querySelector('style[data-omelette-print-defaults]');
      const pageInset = /@page\s*\{[^}]*margin/.test(defaults ? defaults.textContent || '' : '');
      const SEL = 'section,article,figure,table,pre,blockquote,[class~="card" i],[class~="page" i],[class~="sheet" i]';
      for (const el of document.body.querySelectorAll(SEL)) {
        if (el instanceof HTMLElement && el.offsetHeight > PAGE_PX) {
          el.setAttribute('data-om-oversized', '');
          // Fake-paged docs simulate sheets with over-tall break-after:page
          // boxes; honoring the break spills half-blank pages and ends a
          // colored box mid-sheet. Flow them, and (only when we own the page
          // inset) drop the redundant padding/background via the rule below.
          const cs = getComputedStyle(el);
          if (cs.breakAfter === 'page' || cs.pageBreakAfter === 'always') {
            el.setAttribute('data-om-fakepage', '');
          }
        }
      }
      const ost = document.createElement('style');
      ost.textContent = '@media print{' +
        '[data-om-oversized]{break-inside:auto !important;page-break-inside:auto !important}' +
        '[data-om-fakepage]{break-after:auto !important;page-break-after:auto !important}' +
        (pageInset ? '[data-om-fakepage]{padding:0 !important;background:none !important}' : '') +
        '}';
      document.head.appendChild(ost);
    }
  } catch (e) {}
  // macOS Preview renders Skia-PDF Luminosity soft-masks as opaque grey boxes;
  // swap the CSS that triggers them for Preview-safe forms.
  try {
    for (const el of document.body.querySelectorAll('*')) {
      const cs = getComputedStyle(el);

      if (cs.boxShadow !== 'none' && cs.filter === 'none') {
        const outs = [], kept = [];
        for (const s of cs.boxShadow.split(/,(?![^(]*[)])/)) {
          const t = s.trim();
          const m = t.match(/^(rgba?[(][^)]+[)]) (-?[0-9.]+px) (-?[0-9.]+px) ([0-9.]+px) -?[0-9.]+px$/);
          if (m && parseFloat(m[4]) > 0) outs.push('drop-shadow(' + m[2] + ' ' + m[3] + ' ' + m[4] + ' ' + m[1] + ')');
          else kept.push(t);
        }
        if (outs.length) {
          el.style.setProperty('filter', outs.join(' '), 'important');
          el.style.setProperty('box-shadow', kept.join(', ') || 'none', 'important');
        }
      }

      const mask = cs.maskImage && cs.maskImage !== 'none' ? cs.maskImage : cs.webkitMaskImage;
      if (mask && mask !== 'none' && cs.filter === 'none') el.style.setProperty('filter', 'opacity(1)', 'important');
    }
  } catch (e) {}
  setTimeout(() => { try { window.print(); } catch (e) {} }, 200);
})();
</script>
</body>
</html>
